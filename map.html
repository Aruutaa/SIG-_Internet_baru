<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900;1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <title>Peta Interaktif | GeoHealth Purworejo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
</head>
<body>

  <nav class="site-nav">
    <div class="container-wide nav-inner">
      <a class="brand" href="index.html"><span class="brand-mark">✚</span><span>GeoHealth Purworejo<small>WebGIS Kesehatan</small></span></a>
      <button class="mobile-toggle" id="mobileToggle" type="button">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="index.html" data-page="index">Beranda</a>
        <a href="map.html" data-page="map">Peta</a>
        <a href="data.html" data-page="data">Data</a>
        <a href="laporan.html" data-page="laporan">SDLC</a>
        <a href="admin.html" data-page="admin">Admin</a>
      </div>
      <div class="nav-actions"><a class="btn btn-light" href="login.html">Login</a><a class="btn btn-primary" href="map.html">Buka Peta</a></div>
    </div>
  </nav>

  <main class="map-layout">
    <aside class="side-panel">
      <span class="pill">Peta layanan kesehatan</span>
      <h2>Analisis faskes</h2>
      <p class="panel-note">Pilih filter, klik marker, lalu gunakan radius atau pencarian fasilitas terdekat.</p>
      <div class="kpi-grid">
        <div class="kpi"><strong id="kpiTotal">0</strong><span>Data tampil</span></div>
        <div class="kpi"><strong id="kpiBpjs">0</strong><span>Melayani BPJS</span></div>
        <div class="kpi"><strong id="kpiIgd">0</strong><span>IGD 24 jam</span></div>
        <div class="kpi"><strong id="kpiKecamatan">0</strong><span>Kecamatan</span></div>
      </div>
      <div class="panel-section">
        <div class="control"><label for="searchInput">Cari fasilitas</label><input class="input" id="searchInput" placeholder="Nama, alamat, kecamatan..."></div>
        <div class="grid-2" style="margin-top:12px">
          <div class="control"><label for="typeFilter">Jenis</label><select class="select" id="typeFilter"><option value="">Semua</option></select></div>
          <div class="control"><label for="districtFilter">Kecamatan</label><select class="select" id="districtFilter"><option value="">Semua</option></select></div>
        </div>
        <div class="grid-2" style="margin-top:12px">
          <div class="control"><label for="bpjsFilter">BPJS</label><select class="select" id="bpjsFilter"><option value="">Semua</option><option value="1">Melayani</option><option value="0">Tidak</option></select></div>
          <div class="control"><label for="igdFilter">IGD</label><select class="select" id="igdFilter"><option value="">Semua</option><option value="1">24 Jam</option><option value="0">Tidak</option></select></div>
        </div>
      </div>
      <div class="panel-section">
        <div class="control"><label for="radiusSelect">Radius layanan</label><select class="select" id="radiusSelect"><option value="1000">1 km</option><option value="3000" selected>3 km</option><option value="5000">5 km</option></select></div>
        <div class="toolbar" style="margin-top:12px"><button class="btn btn-blue btn-sm" id="btnRadius" type="button">Tampilkan Radius</button><button class="btn btn-light btn-sm" id="btnClearRadius" type="button">Hapus</button></div>
      </div>
      <div class="panel-section">
        <canvas id="typeChart" height="210"></canvas>
      </div>
      <div class="panel-section">
        <div class="analysis-box" id="analysisBox"><b>Ringkasan</b><p>Memuat data...</p></div>
      </div>
      <div class="panel-section toolbar"><button class="btn btn-green btn-sm" id="btnNearest" type="button">Fasilitas terdekat</button><button class="btn btn-yellow btn-sm" id="btnExport" type="button">Ekspor CSV</button><button class="btn btn-light btn-sm" id="btnPrint" type="button">Cetak</button></div>
    </aside>
    <section class="map-shell">
      <div class="map-topbar">
        <div class="search-shell"><span>🔎</span><input id="mapSearch" placeholder="Cari cepat di peta..."></div>
        <button class="btn btn-light btn-sm" id="btnReset" type="button">Reset tampilan</button>
      </div>
      <div class="floating-tools"><button class="tool-button" id="btnLocate" type="button" title="Lokasi saya">⌖</button><button class="tool-button" id="btnFit" type="button" title="Muat semua data">⤢</button></div>
      <div id="map" class="map"></div>
      <div class="legend" id="legend"><b>Legenda</b></div>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
  <script src="assets/js/health-data.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/map.js"></script>
  <script>document.querySelector('[data-page="map"]').classList.add('active')</script>
</body>
</html>
