<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin Data | GeoHealth Purworejo</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900;1000&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><link rel="stylesheet" href="assets/css/style.css"></head><body>
<nav class="site-nav"><div class="container-narrow nav-inner"><a class="brand" href="index.html"><img src="assets/img/Lambang_Kabupaten_Purworejo.png" alt="Logo"><span>GeoHealth Purworejo<small>Dashboard Admin</small></span></a><div class="nav-links"><a href="index.html">Beranda</a><a href="map.html">Peta</a><a href="data.html">Data</a><a href="laporan.html">Laporan</a></div><div class="nav-actions"><button class="btn btn-light" id="logoutBtn">Logout</button></div></div></nav>
<header class="page-hero"><div class="container-narrow"><span class="pill">Dashboard Admin</span><h1>Kelola data fasilitas kesehatan.</h1><p id="adminIntro">Memeriksa status login...</p></div></header>
<main class="section"><div class="container-narrow admin-layout"><section class="card"><h3>Form data fasilitas</h3><form id="facilityForm"><input type="hidden" id="fid"><div class="form-group"><label>Nama fasilitas</label><input class="input" id="nama_faskes" required></div><div class="form-group" style="margin-top:10px"><label>Jenis fasilitas</label><select class="select" id="jenis_faskes" required><option>Rumah Sakit</option><option>Puskesmas</option><option>Klinik</option><option>Apotek</option><option>Laboratorium</option><option>Lainnya</option></select></div><div class="form-group" style="margin-top:10px"><label>Kecamatan</label><input class="input" id="kecamatan" required></div><div class="form-group" style="margin-top:10px"><label>Alamat</label><textarea id="alamat" required></textarea></div><div class="form-grid" style="margin-top:10px"><div class="form-group"><label>Latitude</label><input class="input" id="latitude" type="number" step="any" required></div><div class="form-group"><label>Longitude</label><input class="input" id="longitude" type="number" step="any" required></div></div><div class="form-grid" style="margin-top:10px"><div class="form-group"><label>Telepon</label><input class="input" id="telepon" placeholder="-" value="-"></div><div class="form-group"><label>Jam layanan</label><input class="input" id="jam_layanan" placeholder="08.00-14.00"></div></div><div class="form-grid" style="margin-top:10px"><div class="form-group"><label>Jumlah dokter</label><input class="input" id="jumlah_dokter" type="number" value="0"></div><div class="form-group"><label>Tenaga kesehatan</label><input class="input" id="jumlah_tenaga_kesehatan" type="number" value="0"></div></div><div class="form-grid" style="margin-top:10px"><div class="form-group"><label>Kapasitas tempat tidur</label><input class="input" id="kapasitas_tempat_tidur" type="number" value="0"></div><div class="form-group"><label>Rating</label><input class="input" id="rating" type="number" step="0.1" min="0" max="5" value="0"></div></div><div class="health-checks" style="margin-top:10px"><label><input type="checkbox" id="bpjs"> BPJS</label><label><input type="checkbox" id="igd_24_jam"> IGD 24 Jam</label><label><input type="checkbox" id="rawat_inap"> Rawat Inap</label><label><input type="checkbox" id="ambulans"> Ambulans</label></div><div class="form-group" style="margin-top:10px"><label>Sumber data</label><input class="input" id="sumber_data" value="Input Admin"></div><div class="form-group" style="margin-top:10px"><label>Catatan</label><textarea id="catatan"></textarea></div><div id="formMsg" style="margin-top:12px"></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px"><button class="btn btn-primary" type="submit">Simpan Data</button><button class="btn btn-light" type="button" id="resetForm">Reset</button></div></form></section><section><div class="card" style="margin-bottom:18px"><h3>Pilih koordinat dari peta</h3><p style="color:#667085">Klik peta untuk mengisi latitude dan longitude pada form.</p><div id="adminMap" class="admin-map"></div></div><div class="card"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px"><h3 style="margin:0">Daftar data</h3><button class="btn btn-soft btn-sm" id="reloadAdmin">Muat ulang</button></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Nama</th><th>Jenis</th><th>Kecamatan</th><th>Aksi</th></tr></thead><tbody id="adminRows"><tr><td colspan="4">Memuat data...</td></tr></tbody></table></div></div></section></div></main><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="assets/js/common.js"></script><script src="assets/js/auth.js"></script><script src="assets/js/admin.js"></script></body></html>
